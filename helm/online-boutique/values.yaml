namespace: boutique

# --- Images ---
# All microservices share the same repository base; image name = service name
images:
  repository: gcr.io/google-samples/microservices-demo
  tag: v0.8.1
  sqlProxy:
    repository: gcr.io/cloud-sql-connectors/cloud-sql-proxy
    tag: "2"
  redis:
    repository: redis
    tag: alpine

# --- Service Account (KSA with WI annotation) ---
serviceAccount:
  name: boutique-sql-proxy
  gsaEmail: ""  # Override per-env: orel-gob-dev-euw1-sa-btq-sql@...

# --- Frontend ---
frontend:
  replicas: 1
  port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# --- Cart Service ---
cartservice:
  replicas: 1
  port: 7070
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# --- Cloud SQL Auth Proxy (sidecar on cartservice) ---
sqlProxy:
  enabled: true
  instanceConnectionName: ""  # Override per-env: project:region:instance
  port: 5432
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

# --- Redis ---
redis:
  replicas: 1
  port: 6379
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 125m
      memory: 128Mi

# --- Ad Service ---
adservice:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# --- Checkout Service ---
checkoutservice:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# --- Currency Service ---
currencyservice:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# --- Email Service ---
emailservice:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# --- Payment Service ---
paymentservice:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# --- Product Catalog Service ---
productcatalogservice:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# --- Recommendation Service ---
recommendationservice:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# --- Shipping Service ---
shippingservice:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# --- Gateway (replaces Ingress) ---
gateway:
  enabled: true
  className: gke-l7-regional-external-managed
  staticIpName: ""  # Override per-env: orel-gob-dev-euw1-ip-ingress

# --- Health Check Policy ---
healthCheckPolicy:
  enabled: true
  path: /_healthz
  port: 8080
  intervalSec: 15
  timeoutSec: 5
  healthyThreshold: 2
  unhealthyThreshold: 3
