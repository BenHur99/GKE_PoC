apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkoutservice
  namespace: {{ .Values.namespace }}
  labels:
    app: checkoutservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: checkoutservice
  template:
    metadata:
      labels:
        app: checkoutservice
    spec:
      terminationGracePeriodSeconds: 5
      containers:
        - name: checkoutservice
          image: "{{ .Values.images.repository }}/checkoutservice:{{ .Values.images.tag }}"
          ports:
            - containerPort: 5050
          env:
            - name: PORT
              value: "5050"
            - name: PRODUCT_CATALOG_SERVICE_ADDR
              value: "productcatalogservice:3550"
            - name: SHIPPING_SERVICE_ADDR
              value: "shippingservice:50051"
            - name: PAYMENT_SERVICE_ADDR
              value: "paymentservice:50051"
            - name: EMAIL_SERVICE_ADDR
              value: "emailservice:5000"
            - name: CURRENCY_SERVICE_ADDR
              value: "currencyservice:7000"
            - name: CART_SERVICE_ADDR
              value: "cartservice:7070"
            - name: DISABLE_PROFILER
              value: "1"
          readinessProbe:
            grpc:
              port: 5050
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            grpc:
              port: 5050
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: {{ .Values.checkoutservice.resources.requests.cpu }}
              memory: {{ .Values.checkoutservice.resources.requests.memory }}
            limits:
              cpu: {{ .Values.checkoutservice.resources.limits.cpu }}
              memory: {{ .Values.checkoutservice.resources.limits.memory }}
