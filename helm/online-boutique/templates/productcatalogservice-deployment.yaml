apiVersion: apps/v1
kind: Deployment
metadata:
  name: productcatalogservice
  namespace: {{ .Values.namespace }}
  labels:
    app: productcatalogservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: productcatalogservice
  template:
    metadata:
      labels:
        app: productcatalogservice
    spec:
      terminationGracePeriodSeconds: 5
      containers:
        - name: productcatalogservice
          image: "{{ .Values.images.repository }}/productcatalogservice:{{ .Values.images.tag }}"
          ports:
            - containerPort: 3550
          env:
            - name: PORT
              value: "3550"
            - name: DISABLE_PROFILER
              value: "1"
          readinessProbe:
            grpc:
              port: 3550
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            grpc:
              port: 3550
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: {{ .Values.productcatalogservice.resources.requests.cpu }}
              memory: {{ .Values.productcatalogservice.resources.requests.memory }}
            limits:
              cpu: {{ .Values.productcatalogservice.resources.limits.cpu }}
              memory: {{ .Values.productcatalogservice.resources.limits.memory }}
