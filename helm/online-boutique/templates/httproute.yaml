{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "online-boutique.labels" . | nindent 4 }}
spec:
  parentRefs:
    - kind: Gateway
      name: frontend
  rules:
    - backendRefs:
        - name: frontend
          port: 80
{{- end }}
