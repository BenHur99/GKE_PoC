apiVersion: v1
kind: Service
metadata:
  name: redis-cart
  namespace: {{ .Values.namespace }}
  labels:
    app: redis-cart
    {{- include "online-boutique.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: redis-cart
  ports:
    - port: {{ .Values.redis.port }}
      targetPort: {{ .Values.redis.port }}
      protocol: TCP
      name: redis
