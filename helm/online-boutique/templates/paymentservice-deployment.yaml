apiVersion: apps/v1
kind: Deployment
metadata:
  name: paymentservice
  namespace: {{ .Values.namespace }}
  labels:
    app: paymentservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: paymentservice
  template:
    metadata:
      labels:
        app: paymentservice
    spec:
      terminationGracePeriodSeconds: 5
      containers:
        - name: paymentservice
          image: "{{ .Values.images.repository }}/paymentservice:{{ .Values.images.tag }}"
          ports:
            - containerPort: 50051
          env:
            - name: PORT
              value: "50051"
            - name: DISABLE_PROFILER
              value: "1"
          readinessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: {{ .Values.paymentservice.resources.requests.cpu }}
              memory: {{ .Values.paymentservice.resources.requests.memory }}
            limits:
              cpu: {{ .Values.paymentservice.resources.limits.cpu }}
              memory: {{ .Values.paymentservice.resources.limits.memory }}
