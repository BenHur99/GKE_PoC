name: "Terraform"

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action"
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
      layer_networking:
        description: "Layer: Networking"
        required: false
        type: boolean
        default: false
      layer_database:
        description: "Layer: Database"
        required: false
        type: boolean
        default: false
      layer_compute:
        description: "Layer: Compute"
        required: false
        type: boolean
        default: false
      deploy_app:
        description: "Deploy: Online Boutique (Helm)"
        required: false
        type: boolean
        default: false
      client:
        description: "Client name"
        required: true
        default: "orel"
        type: string
      env_name:
        description: "Environment (dev/staging/prod)"
        required: true
        default: "dev"
        type: string

permissions:
  id-token: write
  contents: read

env:
  TF_VAR_FILE: "tfvars/${{ inputs.client }}/${{ inputs.env_name }}.tfvars"
  TF_VERSION: "1.14.6"

jobs:
  # ===========================================================================
  # Resolve Dependencies & Build Execution Plan
  # ===========================================================================
  resolve:
    name: "Resolve Layer Dependencies"
    runs-on: ubuntu-latest
    outputs:
      run_networking: ${{ steps.resolve.outputs.run_networking }}
      run_database: ${{ steps.resolve.outputs.run_database }}
      run_compute: ${{ steps.resolve.outputs.run_compute }}
      run_deploy_app: ${{ steps.resolve.outputs.run_deploy_app }}
      execution_order: ${{ steps.resolve.outputs.execution_order }}
    steps:
      - name: Resolve dependencies
        id: resolve
        run: |
          echo "============================================="
          echo "  INPUT SELECTION"
          echo "============================================="
          echo "  Action:     ${{ inputs.action }}"
          echo "  Networking: ${{ inputs.layer_networking }}"
          echo "  Database:   ${{ inputs.layer_database }}"
          echo "  Compute:    ${{ inputs.layer_compute }}"
          echo "============================================="
          echo ""

          NETWORKING="${{ inputs.layer_networking }}"
          DATABASE="${{ inputs.layer_database }}"
          COMPUTE="${{ inputs.layer_compute }}"
          DEPLOY_APP="${{ inputs.deploy_app }}"

          # If nothing was selected, fail early
          if [[ "$NETWORKING" == "false" && "$DATABASE" == "false" && "$COMPUTE" == "false" && "$DEPLOY_APP" == "false" ]]; then
            echo "::error::No layers selected. Please select at least one layer."
            exit 1
          fi

          AUTO_ADDS=""

          if [[ "${{ inputs.action }}" == "destroy" ]]; then
            # Destroy direction: destroy only what was explicitly selected.
            : # no-op
          else
            # Apply / Plan direction: auto-add required base layers only when
            # infra layers are explicitly selected (not when deploy_app is alone).
            INFRA_SELECTED="false"
            [[ "$NETWORKING" == "true" || "$DATABASE" == "true" || "$COMPUTE" == "true" ]] && INFRA_SELECTED="true"

            if [[ "$INFRA_SELECTED" == "true" ]]; then
              # Auto-add required base layers for infra
              if [[ "$COMPUTE" == "true" && "$DATABASE" == "false" ]]; then
                DATABASE="true"
                AUTO_ADDS="${AUTO_ADDS}  ⚠️  Auto-added DATABASE (required by compute)\n"
              fi
              if [[ "$DATABASE" == "true" && "$NETWORKING" == "false" ]]; then
                NETWORKING="true"
                AUTO_ADDS="${AUTO_ADDS}  ⚠️  Auto-added NETWORKING (required by database)\n"
              fi

              # If deploy_app is also selected together with infra, also add its deps
              if [[ "$DEPLOY_APP" == "true" ]]; then
                if [[ "$COMPUTE" == "false" ]]; then
                  COMPUTE="true"
                  AUTO_ADDS="${AUTO_ADDS}  ⚠️  Auto-added COMPUTE (required by deploy-app)\n"
                fi
                if [[ "$DATABASE" == "false" ]]; then
                  DATABASE="true"
                  AUTO_ADDS="${AUTO_ADDS}  ⚠️  Auto-added DATABASE (required by deploy-app)\n"
                fi
                # Re-run base resolution after additions
                if [[ "$COMPUTE" == "true" && "$DATABASE" == "false" ]]; then
                  DATABASE="true"
                  AUTO_ADDS="${AUTO_ADDS}  ⚠️  Auto-added DATABASE (required by compute)\n"
                fi
                if [[ "$DATABASE" == "true" && "$NETWORKING" == "false" ]]; then
                  NETWORKING="true"
                  AUTO_ADDS="${AUTO_ADDS}  ⚠️  Auto-added NETWORKING (required by database)\n"
                fi
              fi
            fi
            # If only deploy_app is selected (no infra layers): run deploy-app only,
            # assuming infrastructure already exists in Terraform state.
          fi

          # Build execution order string for display
          if [[ "${{ inputs.action }}" == "destroy" ]]; then
            ORDER=""
            [[ "$DEPLOY_APP" == "true" ]] && ORDER="${ORDER}destroy-app → "
            [[ "$COMPUTE" == "true" ]] && ORDER="${ORDER}compute → "
            [[ "$DATABASE" == "true" ]] && ORDER="${ORDER}database → "
            [[ "$NETWORKING" == "true" ]] && ORDER="${ORDER}networking → "
            ORDER="${ORDER%% → }"
          else
            ORDER=""
            [[ "$NETWORKING" == "true" ]] && ORDER="${ORDER}networking → "
            [[ "$DATABASE" == "true" ]] && ORDER="${ORDER}database → "
            [[ "$COMPUTE" == "true" ]] && ORDER="${ORDER}compute → "
            [[ "$DEPLOY_APP" == "true" ]] && ORDER="${ORDER}deploy-app → "
            ORDER="${ORDER%% → }"
          fi

          echo ""
          echo "============================================="
          echo "  DEPENDENCY RESOLUTION"
          echo "============================================="
          if [[ -n "$AUTO_ADDS" ]]; then
            echo -e "$AUTO_ADDS"
          else
            echo "  ✅ No additional dependencies needed"
          fi
          echo ""
          echo "============================================="
          echo "  EXECUTION PLAN"
          echo "============================================="
          echo "  Action: ${{ inputs.action }}"
          echo "  Order:  ${ORDER}"
          echo ""
          echo "  Networking: ${NETWORKING}"
          echo "  Database:   ${DATABASE}"
          echo "  Compute:    ${COMPUTE}"
          echo "  Deploy App: ${DEPLOY_APP}"
          echo "============================================="

          echo "run_networking=${NETWORKING}" >> "$GITHUB_OUTPUT"
          echo "run_database=${DATABASE}" >> "$GITHUB_OUTPUT"
          echo "run_compute=${COMPUTE}" >> "$GITHUB_OUTPUT"
          echo "run_deploy_app=${DEPLOY_APP}" >> "$GITHUB_OUTPUT"
          echo "execution_order=${ORDER}" >> "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ## 🚀 Terraform Execution Plan

          | Property | Value |
          |----------|-------|
          | **Action** | `${{ inputs.action }}` |
          | **Client** | `${{ inputs.client }}` |
          | **Environment** | `${{ inputs.env_name }}` |
          | **Execution Order** | ${{ steps.resolve.outputs.execution_order }} |

          ### Layers

          | Layer | Status |
          |-------|--------|
          | Networking | ${{ steps.resolve.outputs.run_networking == 'true' && '✅ Selected' || '⏭️ Skipped' }} |
          | Database | ${{ steps.resolve.outputs.run_database == 'true' && '✅ Selected' || '⏭️ Skipped' }} |
          | Compute | ${{ steps.resolve.outputs.run_compute == 'true' && '✅ Selected' || '⏭️ Skipped' }} |
          | Deploy App | ${{ steps.resolve.outputs.run_deploy_app == 'true' && '✅ Selected' || '⏭️ Skipped' }} |
          EOF

  # ===========================================================================
  # PLAN ONLY (action == plan)
  # ===========================================================================

  networking-plan:
    name: "Networking (plan)"
    needs: [resolve]
    if: |
      needs.resolve.outputs.run_networking == 'true' &&
      inputs.action == 'plan'
    runs-on: ubuntu-latest
    environment: ${{ inputs.client }}-${{ inputs.env_name }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform Init
        run: terraform -chdir=gob/networking init -backend-config="prefix=${{ inputs.client }}/${{ inputs.env_name }}/networking"
      - name: Terraform Plan
        run: terraform -chdir=gob/networking plan -var-file=${{ env.TF_VAR_FILE }}

  database-plan:
    name: "Database (plan)"
    needs: [resolve, networking-plan]
    if: |
      always() &&
      needs.resolve.outputs.run_database == 'true' &&
      inputs.action == 'plan' &&
      (needs.networking-plan.result == 'success' || needs.networking-plan.result == 'skipped')
    runs-on: ubuntu-latest
    environment: ${{ inputs.client }}-${{ inputs.env_name }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform Init
        run: terraform -chdir=gob/database init -backend-config="prefix=${{ inputs.client }}/${{ inputs.env_name }}/database"
      - name: Terraform Plan
        run: terraform -chdir=gob/database plan -var-file=${{ env.TF_VAR_FILE }}

  compute-plan:
    name: "Compute (plan)"
    needs: [resolve, database-plan]
    if: |
      always() &&
      needs.resolve.outputs.run_compute == 'true' &&
      inputs.action == 'plan' &&
      (needs.database-plan.result == 'success' || needs.database-plan.result == 'skipped')
    runs-on: ubuntu-latest
    environment: ${{ inputs.client }}-${{ inputs.env_name }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform Init
        run: terraform -chdir=gob/compute init -backend-config="prefix=${{ inputs.client }}/${{ inputs.env_name }}/compute"
      - name: Terraform Plan
        run: terraform -chdir=gob/compute plan -var-file=${{ env.TF_VAR_FILE }}

  # ===========================================================================
  # APPLY (action == apply): networking → database → compute → app
  # ===========================================================================

  networking-apply:
    name: "Networking (apply)"
    needs: [resolve]
    if: |
      needs.resolve.outputs.run_networking == 'true' &&
      inputs.action == 'apply'
    runs-on: ubuntu-latest
    environment: ${{ inputs.client }}-${{ inputs.env_name }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform Init
        run: terraform -chdir=gob/networking init -backend-config="prefix=${{ inputs.client }}/${{ inputs.env_name }}/networking"
      - name: Terraform Apply
        run: terraform -chdir=gob/networking apply -auto-approve -var-file=${{ env.TF_VAR_FILE }}

  database-apply:
    name: "Database (apply)"
    needs: [resolve, networking-apply]
    if: |
      always() &&
      needs.resolve.outputs.run_database == 'true' &&
      inputs.action == 'apply' &&
      (needs.networking-apply.result == 'success' || needs.networking-apply.result == 'skipped')
    runs-on: ubuntu-latest
    environment: ${{ inputs.client }}-${{ inputs.env_name }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform Init
        run: terraform -chdir=gob/database init -backend-config="prefix=${{ inputs.client }}/${{ inputs.env_name }}/database"
      - name: Terraform Apply
        run: terraform -chdir=gob/database apply -auto-approve -var-file=${{ env.TF_VAR_FILE }}

  compute-apply:
    name: "Compute (apply)"
    needs: [resolve, database-apply]
    if: |
      always() &&
      needs.resolve.outputs.run_compute == 'true' &&
      inputs.action == 'apply' &&
      (needs.database-apply.result == 'success' || needs.database-apply.result == 'skipped')
    runs-on: ubuntu-latest
    environment: ${{ inputs.client }}-${{ inputs.env_name }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform Init
        run: terraform -chdir=gob/compute init -backend-config="prefix=${{ inputs.client }}/${{ inputs.env_name }}/compute"
      - name: Terraform Apply
        run: terraform -chdir=gob/compute apply -auto-approve -var-file=${{ env.TF_VAR_FILE }}

  deploy-app:
    name: "Deploy Online Boutique (Helm)"
    needs: [resolve, database-apply, compute-apply]
    if: |
      always() &&
      needs.resolve.outputs.run_deploy_app == 'true' &&
      inputs.action == 'apply' &&
      (needs.database-apply.result == 'success' || needs.database-apply.result == 'skipped') &&
      (needs.compute-apply.result == 'success' || needs.compute-apply.result == 'skipped')
    runs-on: ubuntu-latest
    environment: ${{ inputs.client }}-${{ inputs.env_name }}
    env:
      USE_GKE_GCLOUD_AUTH_PLUGIN: "True"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false
      - uses: google-github-actions/setup-gcloud@6189d56e4096ee891640bb02ac264be376592d6a # v2.1.2
        with:
          install_components: gke-gcloud-auth-plugin
      - name: Get GKE Credentials
        run: |
          CLUSTER_NAME=$(cd gob/compute && terraform init -backend-config="prefix=${{ inputs.client }}/${{ inputs.env_name }}/compute" > /dev/null 2>&1 && terraform output -json cluster_names 2>/dev/null | jq -r '.main // empty')
          if [[ -z "$CLUSTER_NAME" || "$CLUSTER_NAME" == "null" ]]; then
            echo "::error::Could not read cluster name from Terraform state. Make sure the compute layer has been applied."
            exit 1
          fi
          echo "Connecting to cluster: $CLUSTER_NAME"
          gcloud container clusters get-credentials "$CLUSTER_NAME" \
            --zone europe-west1-b \
            --project orel-bh-sandbox
      - name: Read Terraform Outputs
        id: tf-outputs
        run: |
          terraform -chdir=gob/networking init -backend-config="prefix=${{ inputs.client }}/${{ inputs.env_name }}/networking" > /dev/null 2>&1
          STATIC_IP_NAME=$(terraform -chdir=gob/networking output -json static_ip_names | jq -r '.ingress')
          terraform -chdir=gob/database init -backend-config="prefix=${{ inputs.client }}/${{ inputs.env_name }}/database" > /dev/null 2>&1
          SQL_CONNECTION=$(terraform -chdir=gob/database output -json sql_connection_names | jq -r '.main')
          GSA_EMAIL=$(terraform -chdir=gob/database output -json service_account_emails | jq -r '."btq-sql"')
          echo "static_ip_name=${STATIC_IP_NAME}" >> "$GITHUB_OUTPUT"
          echo "sql_connection=${SQL_CONNECTION}" >> "$GITHUB_OUTPUT"
          echo "gsa_email=${GSA_EMAIL}" >> "$GITHUB_OUTPUT"
          echo "Static IP Name: ${STATIC_IP_NAME}"
          echo "SQL Connection: ${SQL_CONNECTION}"
          echo "GSA Email: ${GSA_EMAIL}"
      - uses: azure/setup-helm@fe7b79cd5ee1e45176fcad797de68ecaf3ca4814 # v4.2.0
        with:
          version: v3.14.0
      - name: Helm Deploy
        run: |
          # Adopt existing namespace into Helm management (idempotent)
          kubectl create namespace boutique --dry-run=client -o yaml | kubectl apply -f -
          kubectl label namespace boutique app.kubernetes.io/managed-by=Helm --overwrite
          kubectl annotate namespace boutique \
            meta.helm.sh/release-name=online-boutique \
            meta.helm.sh/release-namespace=boutique \
            --overwrite
          helm upgrade --install online-boutique ./helm/online-boutique \
            --namespace boutique \
            --set gateway.staticIpName=${{ steps.tf-outputs.outputs.static_ip_name }} \
            --set sqlProxy.instanceConnectionName=${{ steps.tf-outputs.outputs.sql_connection }} \
            --set serviceAccount.gsaEmail=${{ steps.tf-outputs.outputs.gsa_email }} \
            --wait \
            --timeout 5m
      - name: Verify Deployment
        run: |
          echo "=== Pods ==="
          kubectl get pods -n boutique
          echo "=== Services ==="
          kubectl get svc -n boutique
          echo "=== Gateway ==="
          kubectl get gateway -n boutique
          echo "=== HTTPRoute ==="
          kubectl get httproute -n boutique
          echo ""
          echo "=== Application URL ==="
          GATEWAY_IP=$(kubectl get gateway frontend -n boutique -o jsonpath='{.status.addresses[0].value}' 2>/dev/null || echo "pending...")
          echo "http://${GATEWAY_IP}"

  # ===========================================================================
  # DESTROY (action == destroy): app → compute → database → networking
  # ===========================================================================

  destroy-app:
    name: "Destroy App"
    needs: [resolve]
    if: |
      needs.resolve.outputs.run_deploy_app == 'true' &&
      inputs.action == 'destroy'
    runs-on: ubuntu-latest
    environment: ${{ inputs.client }}-${{ inputs.env_name }}
    env:
      USE_GKE_GCLOUD_AUTH_PLUGIN: "True"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false
      - uses: google-github-actions/setup-gcloud@6189d56e4096ee891640bb02ac264be376592d6a # v2.1.2
        with:
          install_components: gke-gcloud-auth-plugin
      - name: Get GKE Credentials
        run: |
          CLUSTER_NAME=$(cd gob/compute && terraform init -backend-config="prefix=${{ inputs.client }}/${{ inputs.env_name }}/compute" > /dev/null 2>&1 && terraform output -json cluster_names 2>/dev/null | jq -r '.main // empty')
          if [[ -z "$CLUSTER_NAME" || "$CLUSTER_NAME" == "null" ]]; then
            echo "::error::Could not read cluster name from Terraform state. Make sure the compute layer has been applied."
            exit 1
          fi
          echo "Connecting to cluster: $CLUSTER_NAME"
          gcloud container clusters get-credentials "$CLUSTER_NAME" \
            --zone europe-west1-b \
            --project orel-bh-sandbox
      - uses: azure/setup-helm@fe7b79cd5ee1e45176fcad797de68ecaf3ca4814 # v4.2.0
        with:
          version: v3.14.0
      - name: Helm Uninstall
        run: |
          helm uninstall online-boutique --namespace boutique --wait --timeout 3m || true
          kubectl delete namespace boutique --timeout=60s || true

  compute-destroy:
    name: "Compute (destroy)"
    needs: [resolve, destroy-app]
    if: |
      always() &&
      needs.resolve.outputs.run_compute == 'true' &&
      inputs.action == 'destroy' &&
      (needs.destroy-app.result == 'success' || needs.destroy-app.result == 'skipped')
    runs-on: ubuntu-latest
    environment: ${{ inputs.client }}-${{ inputs.env_name }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform Init
        run: terraform -chdir=gob/compute init -backend-config="prefix=${{ inputs.client }}/${{ inputs.env_name }}/compute"
      - name: Terraform Destroy
        run: terraform -chdir=gob/compute destroy -auto-approve -var-file=${{ env.TF_VAR_FILE }}

  database-destroy:
    name: "Database (destroy)"
    needs: [resolve, compute-destroy]
    if: |
      always() &&
      needs.resolve.outputs.run_database == 'true' &&
      inputs.action == 'destroy' &&
      (needs.compute-destroy.result == 'success' || needs.compute-destroy.result == 'skipped')
    runs-on: ubuntu-latest
    environment: ${{ inputs.client }}-${{ inputs.env_name }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform Init
        run: terraform -chdir=gob/database init -backend-config="prefix=${{ inputs.client }}/${{ inputs.env_name }}/database"
      - name: Terraform Destroy
        run: terraform -chdir=gob/database destroy -auto-approve -var-file=${{ env.TF_VAR_FILE }}

  networking-destroy:
    name: "Networking (destroy)"
    needs: [resolve, database-destroy]
    if: |
      always() &&
      needs.resolve.outputs.run_networking == 'true' &&
      inputs.action == 'destroy' &&
      (needs.database-destroy.result == 'success' || needs.database-destroy.result == 'skipped')
    runs-on: ubuntu-latest
    environment: ${{ inputs.client }}-${{ inputs.env_name }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform Init
        run: terraform -chdir=gob/networking init -backend-config="prefix=${{ inputs.client }}/${{ inputs.env_name }}/networking"
      - name: Terraform Destroy
        run: terraform -chdir=gob/networking destroy -auto-approve -var-file=${{ env.TF_VAR_FILE }}
