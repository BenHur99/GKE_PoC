name: "Terraform"

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action"
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
      layer_networking:
        description: "Layer: Networking"
        required: false
        type: boolean
        default: false
      layer_database:
        description: "Layer: Database"
        required: false
        type: boolean
        default: false
      layer_compute:
        description: "Layer: Compute"
        required: false
        type: boolean
        default: false
      layer_identity:
        description: "Layer: Identity"
        required: false
        type: boolean
        default: false
      deploy_app:
        description: "Deploy: Online Boutique (Helm)"
        required: false
        type: boolean
        default: false
      client:
        description: "Client name"
        required: true
        default: "orel"
        type: string
      env_name:
        description: "Environment (dev/staging/prod)"
        required: true
        default: "dev"
        type: string

permissions:
  id-token: write
  contents: read

env:
  TF_VAR_FILE: "tfvars/${{ inputs.client }}/${{ inputs.env_name }}.tfvars"
  TF_VERSION: "1.14.6"

jobs:
  # ===========================================================================
  # Resolve Dependencies & Build Execution Plan
  # ===========================================================================
  resolve:
    name: "Resolve Layer Dependencies"
    runs-on: ubuntu-latest
    outputs:
      run_networking: ${{ steps.resolve.outputs.run_networking }}
      run_database: ${{ steps.resolve.outputs.run_database }}
      run_compute: ${{ steps.resolve.outputs.run_compute }}
      run_identity: ${{ steps.resolve.outputs.run_identity }}
      run_deploy_app: ${{ steps.resolve.outputs.run_deploy_app }}
      execution_order: ${{ steps.resolve.outputs.execution_order }}
    steps:
      - name: Resolve dependencies
        id: resolve
        run: |
          echo "============================================="
          echo "  INPUT SELECTION"
          echo "============================================="
          echo "  Action:     ${{ inputs.action }}"
          echo "  Networking: ${{ inputs.layer_networking }}"
          echo "  Database:   ${{ inputs.layer_database }}"
          echo "  Compute:    ${{ inputs.layer_compute }}"
          echo "  Identity:   ${{ inputs.layer_identity }}"
          echo "============================================="
          echo ""

          # ---------------------------------------------------------------
          # Dependency graph (apply / plan direction):
          #   networking  → (none)
          #   database    → networking
          #   compute     → database → networking
          #   identity    → database (for GSA names via remote_state)
          #
          # For destroy the execution order is reversed, but the dependency
          # resolution is the same — if you destroy networking you must
          # first destroy everything that depends on it.
          # ---------------------------------------------------------------

          NETWORKING="${{ inputs.layer_networking }}"
          DATABASE="${{ inputs.layer_database }}"
          COMPUTE="${{ inputs.layer_compute }}"
          IDENTITY="${{ inputs.layer_identity }}"

          # If nothing was selected, fail early
          if [[ "$NETWORKING" == "false" && "$DATABASE" == "false" && "$COMPUTE" == "false" && "$IDENTITY" == "false" ]]; then
            echo "::error::No layers selected. Please select at least one layer."
            exit 1
          fi

          AUTO_ADDS=""

          if [[ "${{ inputs.action }}" == "destroy" ]]; then
            # Destroy direction: user controls exactly which layers to destroy.
            # No auto-adds — destroy only what was explicitly selected.
            : # no-op
          else
            # Apply / Plan direction: if a layer needs a base layer, add it
            if [[ "$IDENTITY" == "true" && "$DATABASE" == "false" ]]; then
              DATABASE="true"
              AUTO_ADDS="${AUTO_ADDS}  ⚠️  Auto-added DATABASE (required by identity)\n"
            fi
            if [[ "$COMPUTE" == "true" && "$DATABASE" == "false" ]]; then
              DATABASE="true"
              AUTO_ADDS="${AUTO_ADDS}  ⚠️  Auto-added DATABASE (required by compute)\n"
            fi
            if [[ "$DATABASE" == "true" && "$NETWORKING" == "false" ]]; then
              NETWORKING="true"
              AUTO_ADDS="${AUTO_ADDS}  ⚠️  Auto-added NETWORKING (required by database)\n"
            fi
          fi

          DEPLOY_APP="${{ inputs.deploy_app }}"

          # deploy-app requires identity (for WI) + compute (for GKE) + networking (for IP)
          if [[ "${{ inputs.action }}" != "destroy" && "$DEPLOY_APP" == "true" ]]; then
            if [[ "$IDENTITY" == "false" ]]; then
              IDENTITY="true"
              AUTO_ADDS="${AUTO_ADDS}  ⚠️  Auto-added IDENTITY (required by deploy-app)\n"
            fi
            if [[ "$COMPUTE" == "false" ]]; then
              COMPUTE="true"
              AUTO_ADDS="${AUTO_ADDS}  ⚠️  Auto-added COMPUTE (required by deploy-app)\n"
            fi
          fi

          # Re-run base dependency resolution after deploy-app additions
          if [[ "$IDENTITY" == "true" && "$DATABASE" == "false" ]]; then
            DATABASE="true"
            AUTO_ADDS="${AUTO_ADDS}  ⚠️  Auto-added DATABASE (required by identity)\n"
          fi
          if [[ "$COMPUTE" == "true" && "$DATABASE" == "false" ]]; then
            DATABASE="true"
            AUTO_ADDS="${AUTO_ADDS}  ⚠️  Auto-added DATABASE (required by compute)\n"
          fi
          if [[ "$DATABASE" == "true" && "$NETWORKING" == "false" ]]; then
            NETWORKING="true"
            AUTO_ADDS="${AUTO_ADDS}  ⚠️  Auto-added NETWORKING (required by database)\n"
          fi

          # Build execution order string for display
          if [[ "${{ inputs.action }}" == "destroy" ]]; then
            ORDER=""
            [[ "$DEPLOY_APP" == "true" ]] && ORDER="${ORDER}destroy-app → "
            [[ "$IDENTITY" == "true" ]] && ORDER="${ORDER}identity → "
            [[ "$COMPUTE" == "true" ]] && ORDER="${ORDER}compute → "
            [[ "$DATABASE" == "true" ]] && ORDER="${ORDER}database → "
            [[ "$NETWORKING" == "true" ]] && ORDER="${ORDER}networking → "
            ORDER="${ORDER%% → }"
          else
            ORDER=""
            [[ "$NETWORKING" == "true" ]] && ORDER="${ORDER}networking → "
            [[ "$DATABASE" == "true" ]] && ORDER="${ORDER}database → "
            [[ "$COMPUTE" == "true" ]] && ORDER="${ORDER}compute → "
            [[ "$IDENTITY" == "true" ]] && ORDER="${ORDER}identity → "
            [[ "$DEPLOY_APP" == "true" ]] && ORDER="${ORDER}deploy-app → "
            ORDER="${ORDER%% → }"
          fi

          echo ""
          echo "============================================="
          echo "  DEPENDENCY RESOLUTION"
          echo "============================================="
          if [[ -n "$AUTO_ADDS" ]]; then
            echo -e "$AUTO_ADDS"
          else
            echo "  ✅ No additional dependencies needed"
          fi
          echo ""
          echo "============================================="
          echo "  EXECUTION PLAN"
          echo "============================================="
          echo "  Action: ${{ inputs.action }}"
          echo "  Order:  ${ORDER}"
          echo ""
          echo "  Networking: ${NETWORKING}"
          echo "  Database:   ${DATABASE}"
          echo "  Compute:    ${COMPUTE}"
          echo "  Identity:   ${IDENTITY}"
          echo "============================================="

          echo "run_networking=${NETWORKING}" >> "$GITHUB_OUTPUT"
          echo "run_database=${DATABASE}" >> "$GITHUB_OUTPUT"
          echo "run_compute=${COMPUTE}" >> "$GITHUB_OUTPUT"
          echo "run_identity=${IDENTITY}" >> "$GITHUB_OUTPUT"
          echo "run_deploy_app=${DEPLOY_APP}" >> "$GITHUB_OUTPUT"
          echo "execution_order=${ORDER}" >> "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ## 🚀 Terraform Execution Plan

          | Property | Value |
          |----------|-------|
          | **Action** | `${{ inputs.action }}` |
          | **Client** | `${{ inputs.client }}` |
          | **Environment** | `${{ inputs.env_name }}` |
          | **Execution Order** | ${{ steps.resolve.outputs.execution_order }} |

          ### Layers

          | Layer | Status |
          |-------|--------|
          | Networking | ${{ steps.resolve.outputs.run_networking == 'true' && '✅ Selected' || '⏭️ Skipped' }} |
          | Database | ${{ steps.resolve.outputs.run_database == 'true' && '✅ Selected' || '⏭️ Skipped' }} |
          | Compute | ${{ steps.resolve.outputs.run_compute == 'true' && '✅ Selected' || '⏭️ Skipped' }} |
          | Identity | ${{ steps.resolve.outputs.run_identity == 'true' && '✅ Selected' || '⏭️ Skipped' }} |
          | Deploy App | ${{ steps.resolve.outputs.run_deploy_app == 'true' && '✅ Selected' || '⏭️ Skipped' }} |
          EOF

  # ===========================================================================
  # APPLY DIRECTION: networking → database → compute → identity
  # Each layer: plan job → approval environment → apply job
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Layer 1: Networking — Plan
  # ---------------------------------------------------------------------------
  networking-plan:
    name: "Networking (plan)"
    needs: [resolve]
    if: |
      needs.resolve.outputs.run_networking == 'true' &&
      inputs.action != 'destroy'
    runs-on: ubuntu-latest
    environment: ${{ inputs.client }}-${{ inputs.env_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Authenticate to GCP
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform -chdir=gob/networking init -backend-config="prefix=${{ inputs.client }}/${{ inputs.env_name }}/networking"

      - name: Terraform Plan
        run: terraform -chdir=gob/networking plan -var-file=${{ env.TF_VAR_FILE }}

  # ---------------------------------------------------------------------------
  # Layer 1: Networking — Approval + Apply
  # environment "orel-dev" must have required_reviewers configured in GitHub Settings.
  # ---------------------------------------------------------------------------
  networking-apply:
    name: "Networking (apply)"
    needs: [resolve, networking-plan]
    if: |
      always() &&
      needs.resolve.outputs.run_networking == 'true' &&
      inputs.action == 'apply' &&
      needs.networking-plan.result == 'success'
    runs-on: ubuntu-latest
    environment: ${{ inputs.client }}-${{ inputs.env_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Authenticate to GCP
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform -chdir=gob/networking init -backend-config="prefix=${{ inputs.client }}/${{ inputs.env_name }}/networking"

      - name: Terraform Apply
        run: terraform -chdir=gob/networking apply -auto-approve -var-file=${{ env.TF_VAR_FILE }}

  # ---------------------------------------------------------------------------
  # Layer 2: Database — Plan
  # Runs after networking-apply (success or skipped when not selected)
  # ---------------------------------------------------------------------------
  database-plan:
    name: "Database (plan)"
    needs: [resolve, networking-apply]
    if: |
      always() &&
      needs.resolve.outputs.run_database == 'true' &&
      inputs.action != 'destroy' &&
      (needs.networking-apply.result == 'success' || needs.networking-apply.result == 'skipped')
    runs-on: ubuntu-latest
    environment: ${{ inputs.client }}-${{ inputs.env_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Authenticate to GCP
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform -chdir=gob/database init -backend-config="prefix=${{ inputs.client }}/${{ inputs.env_name }}/database"

      - name: Terraform Plan
        run: terraform -chdir=gob/database plan -var-file=${{ env.TF_VAR_FILE }}

  # ---------------------------------------------------------------------------
  # Layer 2: Database — Approval + Apply
  # ---------------------------------------------------------------------------
  database-apply:
    name: "Database (apply)"
    needs: [resolve, database-plan]
    if: |
      always() &&
      needs.resolve.outputs.run_database == 'true' &&
      inputs.action == 'apply' &&
      needs.database-plan.result == 'success'
    runs-on: ubuntu-latest
    environment: ${{ inputs.client }}-${{ inputs.env_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Authenticate to GCP
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform -chdir=gob/database init -backend-config="prefix=${{ inputs.client }}/${{ inputs.env_name }}/database"

      - name: Terraform Apply
        run: terraform -chdir=gob/database apply -auto-approve -var-file=${{ env.TF_VAR_FILE }}

  # ---------------------------------------------------------------------------
  # Layer 3: Compute — Plan
  # ---------------------------------------------------------------------------
  compute-plan:
    name: "Compute (plan)"
    needs: [resolve, database-apply]
    if: |
      always() &&
      needs.resolve.outputs.run_compute == 'true' &&
      inputs.action != 'destroy' &&
      (needs.database-apply.result == 'success' || needs.database-apply.result == 'skipped')
    runs-on: ubuntu-latest
    environment: ${{ inputs.client }}-${{ inputs.env_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Authenticate to GCP
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform -chdir=gob/compute init -backend-config="prefix=${{ inputs.client }}/${{ inputs.env_name }}/compute"

      - name: Terraform Plan
        run: terraform -chdir=gob/compute plan -var-file=${{ env.TF_VAR_FILE }}

  # ---------------------------------------------------------------------------
  # Layer 3: Compute — Approval + Apply
  # ---------------------------------------------------------------------------
  compute-apply:
    name: "Compute (apply)"
    needs: [resolve, compute-plan]
    if: |
      always() &&
      needs.resolve.outputs.run_compute == 'true' &&
      inputs.action == 'apply' &&
      needs.compute-plan.result == 'success'
    runs-on: ubuntu-latest
    environment: ${{ inputs.client }}-${{ inputs.env_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Authenticate to GCP
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform -chdir=gob/compute init -backend-config="prefix=${{ inputs.client }}/${{ inputs.env_name }}/compute"

      - name: Terraform Apply
        run: terraform -chdir=gob/compute apply -auto-approve -var-file=${{ env.TF_VAR_FILE }}

  # ---------------------------------------------------------------------------
  # Layer 4: Identity — Plan
  # ---------------------------------------------------------------------------
  identity-plan:
    name: "Identity (plan)"
    needs: [resolve, database-apply]
    if: |
      always() &&
      needs.resolve.outputs.run_identity == 'true' &&
      inputs.action != 'destroy' &&
      (needs.database-apply.result == 'success' || needs.database-apply.result == 'skipped')
    runs-on: ubuntu-latest
    environment: ${{ inputs.client }}-${{ inputs.env_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Authenticate to GCP
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform -chdir=gob/identity init -backend-config="prefix=${{ inputs.client }}/${{ inputs.env_name }}/identity"

      - name: Terraform Plan
        run: terraform -chdir=gob/identity plan -var-file=${{ env.TF_VAR_FILE }}

  # ---------------------------------------------------------------------------
  # Layer 4: Identity — Approval + Apply
  # ---------------------------------------------------------------------------
  identity-apply:
    name: "Identity (apply)"
    needs: [resolve, identity-plan]
    if: |
      always() &&
      needs.resolve.outputs.run_identity == 'true' &&
      inputs.action == 'apply' &&
      needs.identity-plan.result == 'success'
    runs-on: ubuntu-latest
    environment: ${{ inputs.client }}-${{ inputs.env_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Authenticate to GCP
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform -chdir=gob/identity init -backend-config="prefix=${{ inputs.client }}/${{ inputs.env_name }}/identity"

      - name: Terraform Apply
        run: terraform -chdir=gob/identity apply -auto-approve -var-file=${{ env.TF_VAR_FILE }}

  # ==========================================================================
  # APPLICATION DEPLOYMENT (after all Terraform layers)
  # ==========================================================================

  deploy-app:
    name: "Deploy Online Boutique (Helm)"
    needs: [resolve, identity-apply, compute-apply]
    if: |
      always() &&
      needs.resolve.outputs.run_deploy_app == 'true' &&
      inputs.action == 'apply' &&
      (needs.identity-apply.result == 'success' || needs.identity-apply.result == 'skipped') &&
      (needs.compute-apply.result == 'success' || needs.compute-apply.result == 'skipped')
    runs-on: ubuntu-latest
    environment: ${{ inputs.client }}-${{ inputs.env_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Authenticate to GCP
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Install gke-gcloud-auth-plugin
        run: |
          gcloud components install gke-gcloud-auth-plugin --quiet 2>/dev/null || true

      - name: Get GKE Credentials
        run: |
          CLUSTER_NAME=$(cd gob/compute && terraform init -backend-config="prefix=${{ inputs.client }}/${{ inputs.env_name }}/compute" > /dev/null 2>&1 && terraform output -json cluster_names | jq -r '.main')
          gcloud container clusters get-credentials "$CLUSTER_NAME" \
            --zone europe-west1-b \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Read Terraform Outputs
        id: tf-outputs
        run: |
          # Init networking to read static IP name
          terraform -chdir=gob/networking init -backend-config="prefix=${{ inputs.client }}/${{ inputs.env_name }}/networking" > /dev/null 2>&1
          STATIC_IP_NAME=$(terraform -chdir=gob/networking output -json static_ip_names | jq -r '.ingress')

          # Init database to read SQL connection and GSA email
          terraform -chdir=gob/database init -backend-config="prefix=${{ inputs.client }}/${{ inputs.env_name }}/database" > /dev/null 2>&1
          SQL_CONNECTION=$(terraform -chdir=gob/database output -json sql_connection_names | jq -r '.main')
          GSA_EMAIL=$(terraform -chdir=gob/database output -json service_account_emails | jq -r '."btq-sql"')

          echo "static_ip_name=${STATIC_IP_NAME}" >> "$GITHUB_OUTPUT"
          echo "sql_connection=${SQL_CONNECTION}" >> "$GITHUB_OUTPUT"
          echo "gsa_email=${GSA_EMAIL}" >> "$GITHUB_OUTPUT"

          echo "Static IP Name: ${STATIC_IP_NAME}"
          echo "SQL Connection: ${SQL_CONNECTION}"
          echo "GSA Email: ${GSA_EMAIL}"

      - name: Install Helm
        uses: azure/setup-helm@fe7b79cd5ee1e45176fcad797de68ecaf3ca4814 # v4.2.0
        with:
          version: v3.14.0

      - name: Helm Deploy
        run: |
          helm upgrade --install online-boutique ./helm/online-boutique \
            --namespace boutique \
            --create-namespace \
            --set gateway.staticIpName=${{ steps.tf-outputs.outputs.static_ip_name }} \
            --set sqlProxy.instanceConnectionName=${{ steps.tf-outputs.outputs.sql_connection }} \
            --set serviceAccount.gsaEmail=${{ steps.tf-outputs.outputs.gsa_email }} \
            --wait \
            --timeout 5m

      - name: Verify Deployment
        run: |
          echo "=== Pods ==="
          kubectl get pods -n boutique
          echo ""
          echo "=== Services ==="
          kubectl get svc -n boutique
          echo ""
          echo "=== Gateway ==="
          kubectl get gateway -n boutique
          echo ""
          echo "=== HTTPRoute ==="
          kubectl get httproute -n boutique

  # ===========================================================================
  # DESTROY DIRECTION: identity → compute → database → networking
  # Each layer: plan -destroy job → approval environment → destroy job
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Application — must be uninstalled first (before identity destroy)
  # ---------------------------------------------------------------------------
  destroy-app-plan:
    name: "Destroy App (plan)"
    needs: [resolve]
    if: |
      needs.resolve.outputs.run_deploy_app == 'true' &&
      inputs.action == 'destroy'
    runs-on: ubuntu-latest
    environment: ${{ inputs.client }}-${{ inputs.env_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Authenticate to GCP
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Install gke-gcloud-auth-plugin
        run: |
          gcloud components install gke-gcloud-auth-plugin --quiet 2>/dev/null || true

      - name: Get GKE Credentials
        run: |
          CLUSTER_NAME=$(cd gob/compute && terraform init -backend-config="prefix=${{ inputs.client }}/${{ inputs.env_name }}/compute" > /dev/null 2>&1 && terraform output -json cluster_names | jq -r '.main')
          gcloud container clusters get-credentials "$CLUSTER_NAME" \
            --zone europe-west1-b \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Install Helm
        uses: azure/setup-helm@fe7b79cd5ee1e45176fcad797de68ecaf3ca4814 # v4.2.0
        with:
          version: v3.14.0

      - name: Helm Diff (dry-run)
        run: |
          echo "The following Helm release will be uninstalled:"
          helm list --namespace boutique || true
          echo ""
          echo "Kubernetes resources in namespace boutique:"
          kubectl get all -n boutique || true

