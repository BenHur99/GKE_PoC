name: "Terraform Destroy"

on:
  workflow_dispatch:
    inputs:
      scope:
        description: "Which layers to destroy"
        required: true
        type: choice
        options:
          - all
          - networking
          - database
          - compute
      client:
        description: "Client name"
        required: true
        default: "orel"
        type: string
      environment:
        description: "Environment"
        required: true
        default: "dev"
        type: string

permissions:
  id-token: write
  contents: read

env:
  TF_VAR_FILE: "tfvars/${{ inputs.client }}/${{ inputs.environment }}.tfvars"
  TF_VERSION: "1.14.6"

jobs:
  # =========================================================================
  # Layer 3: Compute (destroyed first)
  # =========================================================================
  compute:
    name: "Compute (destroy)"
    if: contains(fromJSON('["all","compute"]'), inputs.scope)
    runs-on: ubuntu-latest
    environment: ${{ inputs.client }}-${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Authenticate to GCP
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform -chdir=gob/compute init -backend-config="prefix=${{ inputs.client }}/${{ inputs.environment }}/compute"

      - name: Terraform Destroy
        run: terraform -chdir=gob/compute destroy -auto-approve -var-file=${{ env.TF_VAR_FILE }}

  # =========================================================================
  # Layer 2: Database (destroyed second)
  # =========================================================================
  database:
    name: "Database (destroy)"
    needs: [compute]
    if: |
      always() &&
      contains(fromJSON('["all","database"]'), inputs.scope) &&
      (needs.compute.result == 'success' || needs.compute.result == 'skipped')
    runs-on: ubuntu-latest
    environment: ${{ inputs.client }}-${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Authenticate to GCP
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform -chdir=gob/database init -backend-config="prefix=${{ inputs.client }}/${{ inputs.environment }}/database"

      - name: Terraform Destroy
        run: terraform -chdir=gob/database destroy -auto-approve -var-file=${{ env.TF_VAR_FILE }}

  # =========================================================================
  # Layer 1: Networking (destroyed last)
  # =========================================================================
  networking:
    name: "Networking (destroy)"
    needs: [database]
    if: |
      always() &&
      contains(fromJSON('["all","networking"]'), inputs.scope) &&
      (needs.database.result == 'success' || needs.database.result == 'skipped')
    runs-on: ubuntu-latest
    environment: ${{ inputs.client }}-${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Authenticate to GCP
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform -chdir=gob/networking init -backend-config="prefix=${{ inputs.client }}/${{ inputs.environment }}/networking"

      - name: Terraform Destroy
        run: terraform -chdir=gob/networking destroy -auto-approve -var-file=${{ env.TF_VAR_FILE }}
